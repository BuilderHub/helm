enabled: true

build-console:
  replicaCount: 2

  image:
    repository: ghcr.io/builderhub/build-console
    pullPolicy: IfNotPresent
    tag: ""

  serviceAccount:
    create: true
    automount: true

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false

  service:
    type: ClusterIP
    port: 80
    targetPort: 3001

  ingress:
    enabled: false

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  autoscaling:
    enabled: false

  env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "3001"
    - name: HOSTNAME
      value: "0.0.0.0"
