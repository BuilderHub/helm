# BuilderHub BuildKit Operator Helm values

operator:
  image:
    repository: ghcr.io/builderhub/build-operator
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  # Leader election for HA
  leaderElection: true

  securityContext:
    runAsUser: 65532

# Install CRDs (set false if managing CRDs separately)
installCRDs: true

# Namespace for the operator
namespaceOverride: ""

nodeSelector: {}

tolerations: []

affinity: {}

# ServiceAccount
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC
rbac:
  create: true
