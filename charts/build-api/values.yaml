replicaCount: 1

image:
  repository: ghcr.io/builderhub/build-api
  pullPolicy: IfNotPresent
  tag: ""

migrate:
  image:
    repository: migrate/migrate
    tag: v4.17.0
    pullPolicy: IfNotPresent

database:
  url: "postgres://builderhub:builderhub123@postgres:5432/builderhub?sslmode=disable"
  # When set, DATABASE_URL is read from this Secret (e.g. CNPG pgsql-app) instead of database.url.
  existingSecret: ""
  existingSecretKey: uri

jwt:
  secret: "dev-secret-change-in-production"

cors:
  allowedOrigins: "http://localhost:3000,http://localhost:3001,https://console.builder-hub.dev"

# Public DNS suffix used to expose builders at <builder>-<arch>.<org>.<builderBaseDomain>.
# Empty disables internet exposure (builders fall back to in-cluster/NodePort only).
builderBaseDomain: ""

service:
  type: ClusterIP
  httpPort: 8090
  grpcPort: 9090
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

serviceAccount:
  create: true
  automount: true

rbac:
  create: true
