---
name: On PR

on:
  pull_request:
    paths:
      - "charts/**"
      - "ci/**"
      - "scripts/**"
      - "values.yaml"
      - "Chart.yaml"
      - ".github/workflows/on-pr.yaml"

defaults:
  run:
    shell: bash

env:
  E2E_NAMESPACE: builderhub-ci
  BUILD_API_IMAGE_TAG: latest
  BUILD_OPERATOR_IMAGE_TAG: latest
  HELM_WAIT_TIMEOUT: 5m

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.20.2

      - name: Bootstrap chart dependencies
        run: ./scripts/bootstrap-deps.sh

      - name: Helm lint (CI values)
        run: helm lint . -f ci/e2e-values.yaml || true

      - name: Helm template (CI values)
        run: helm template builderhub-ci . -f ci/e2e-values.yaml >/tmp/rendered.yaml

      - name: Create KinD cluster
        uses: helm/kind-action@v1.14.0

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Deploy Postgres
        run: |
          set -euo pipefail
          kubectl create namespace "${E2E_NAMESPACE}"
          kubectl apply -f ci/postgres.yaml -n "${E2E_NAMESPACE}"
          kubectl -n "${E2E_NAMESPACE}" rollout status deploy/postgres --timeout=5m

      - name: Install platform charts
        id: helm-install
        run: |
          set -euo pipefail
          # Install wrappers separately so build-console is not deployed (umbrella
          # vendored deps ignore enabled:false) and --wait does not stall.
          helm upgrade --install build-operator charts/build-operator \
            -n "${E2E_NAMESPACE}" \
            -f ci/e2e-values.yaml \
            --wait --timeout "${HELM_WAIT_TIMEOUT}"
          helm upgrade --install build-api charts/build-api \
            -n "${E2E_NAMESPACE}" \
            -f ci/e2e-values.yaml \
            --wait --timeout "${HELM_WAIT_TIMEOUT}"

      - name: Debug platform namespace
        if: always()
        run: |
          set +e
          echo "=== helm releases ==="
          helm list -n "${E2E_NAMESPACE}" || true
          echo "=== resources ==="
          kubectl -n "${E2E_NAMESPACE}" get all,jobs,pvc,events --sort-by=.lastTimestamp 2>/dev/null \
            || kubectl -n "${E2E_NAMESPACE}" get all,jobs,events || true
          echo "=== pod describe ==="
          kubectl -n "${E2E_NAMESPACE}" describe pods || true
          echo "=== operator logs ==="
          kubectl -n "${E2E_NAMESPACE}" logs deploy/build-operator --tail=200 2>/dev/null || true
          echo "=== api logs ==="
          kubectl -n "${E2E_NAMESPACE}" logs deploy/build-api --tail=200 2>/dev/null || true
          kubectl -n "${E2E_NAMESPACE}" logs -l app.kubernetes.io/component=migrate --tail=100 2>/dev/null || true

      - name: Apply builder templates
        run: kubectl apply -f ci/builder-templates.yaml

      - name: Run e2e tests
        env:
          E2E_NAMESPACE: ${{ env.E2E_NAMESPACE }}
          BUILD_API_DEPLOY: build-api
          BUILD_API_SVC: build-api
          BUILD_OPERATOR_DEPLOY: build-operator
        run: |
          chmod +x ./scripts/e2e-test.sh
          ./scripts/e2e-test.sh

      - name: Debug cluster
        if: always()
        run: |
          set +e
          kubectl get pods -A -o wide || true
          kubectl -n "${E2E_NAMESPACE}" get events --sort-by='.lastTimestamp' || true
          kubectl -n "${E2E_NAMESPACE}" describe pods || true
          kubectl -n "${E2E_NAMESPACE}" logs deploy/build-operator --tail=200 || true
          kubectl -n "${E2E_NAMESPACE}" logs deploy/build-api --tail=200 || true
