---
name: On PR

on:
  pull_request:
    paths:
      - "charts/**"
      - "ci/**"
      - "scripts/**"
      - "values.yaml"
      - "Chart.yaml"
      - ".github/workflows/on-pr.yaml"

defaults:
  run:
    shell: bash

env:
  E2E_NAMESPACE: builderhub-ci
  BUILD_API_IMAGE_TAG: latest
  BUILD_OPERATOR_IMAGE_TAG: latest

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.20.2

      - name: Bootstrap chart dependencies
        run: ./scripts/bootstrap-deps.sh

      - name: Helm lint (CI values)
        run: helm lint . -f ci/e2e-values.yaml || true

      - name: Helm template (CI values)
        run: helm template builderhub-ci . -f ci/e2e-values.yaml >/tmp/rendered.yaml

      - name: Create KinD cluster
        uses: helm/kind-action@v1.14.0

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Deploy Postgres
        run: |
          set -euo pipefail
          kubectl apply -f ci/postgres.yaml -n "${E2E_NAMESPACE}" --create-namespace
          kubectl -n "${E2E_NAMESPACE}" rollout status deploy/postgres --timeout=5m

      - name: Apply builder templates
        run: kubectl apply -f ci/builder-templates.yaml

      - name: Install umbrella chart
        run: |
          helm upgrade --install builderhub-ci . \
            -n "${E2E_NAMESPACE}" \
            -f ci/e2e-values.yaml \
            --wait --timeout 20m

      - name: Run e2e tests
        env:
          E2E_NAMESPACE: ${{ env.E2E_NAMESPACE }}
        run: |
          chmod +x ./scripts/e2e-test.sh
          ./scripts/e2e-test.sh

      - name: Debug cluster
        if: always()
        run: |
          kubectl get pods -A -o wide || true
          kubectl -n "${E2E_NAMESPACE}" get events --sort-by='.lastTimestamp' || true
          kubectl -n "${E2E_NAMESPACE}" describe pod -l app.kubernetes.io/name=build-api || true
          kubectl -n "${E2E_NAMESPACE}" logs -l app.kubernetes.io/name=build-api --tail=200 || true
          kubectl -n "${E2E_NAMESPACE}" logs deploy/build-operator --tail=200 || true
