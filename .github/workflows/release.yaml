---
name: Release

on:
  release:
    types:
      - published

defaults:
  run:
    shell: bash

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.20.2

      - name: Bootstrap chart dependencies
        run: ./scripts/bootstrap-deps.sh

      - name: Helm lint
        run: helm lint . || true

      - name: Helm template (smoke test)
        run: helm template builderhub . --namespace builderhub

      - name: Package chart
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          CHART_VERSION="${TAG#v}"
          helm package . --version "$CHART_VERSION" --app-version "$CHART_VERSION"

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ github.token }}" | helm registry login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Push chart to GHCR
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          CHART_VERSION="${TAG#v}"
          helm push "builderhub-${CHART_VERSION}.tgz" "oci://ghcr.io/builderhub/helm/charts"
